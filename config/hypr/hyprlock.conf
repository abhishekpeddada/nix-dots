# colors
source = ~/dotfiles/config/hypr/themes/gruvbox.conf

$font_family = Geist
$font_family_bold = Geist Bold
$font_family_clock = Geist Black
$font_symbols = GeistMono NFM

general {
  hide_cursor = true
  ignore_empty_input = true
  immediate_render = true
  fail_timeout = 1000
}

# background
background {
  monitor =
  path = ~/dotfiles/backgrounds/default.jpg
  blur_passes = 2
  blur_size = 8
  noise = 0.02
  contrast = 1.40
  brightness = 0.40
  vibrancy = 0.20
  vibrancy_darkness = 0.20
}

# clock
label {
  monitor =
  text = <b>$TIME12</b>
  shadow_size = 4
  shadow_passes = 4
  shadow_boost = 2.0
  color = $fg_primary
  font_size = 100
  font_family = $font_family_clock
  position = 0, 80
  halign = center
  valign = center
}

# lock icon
label {
  monitor =
  text = 
  shadow_size = 2
  shadow_passes = 2
  shadow_boost = 0.80
  color = $fg_secondary
  font_size = 60
  font_family = $font_symbols
  position = 0,40
  halign = center
  valign = bottom
}

# Password box
input-field {
  monitor =
  size = 180, 40
  outline_thickness = 2

  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = true
  dots_rounding = 4 # -1 default circle, -2 follow input-field rounding

  fade_on_empty = true
  fade_timeout = 800 # milliseconds before fade_on_empty is triggered.
  placeholder_text = Inject Passkey
  hide_input = false
  rounding = -1 # -1 means complete rounding (circle/oval)
  check_color = $accent_warn
  fail_color = $accent_error
  fail_text = $FAIL <b>($ATTEMPTS)</b>
  capslock_color = -1
  numlock_color = -1
  bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
  invert_numlock = true # change color if numlock is off
  swap_font_color = false

  outer_color = $bg_dark
  inner_color = $bg_darkest
  font_color = $fg_tertiary
  font_family = $font_family_bold

  position = 0, -180
  halign = center
  valign = center
}
