source = ~/dotfiles/config/hypr/themes/gruvbox.conf

exec-once = dbus-update-activation-environment --systemd --all
exec-once = nm-applet & blueman-applet
exec-once = waybar & hyprpaper
exec-once = dunst & avizo-service

exec-once = wl-paste --type text --watch cliphist store # text data
exec-once = wl-paste --type image --watch cliphist store # image data

monitorv2 {
  output = eDP-1
  mode = preferred
  position = auto
  scale = 1
}

general {
  gaps_in = 2
  gaps_out = 5
  border_size = 2
  layout = dwindle
  resize_on_border = on
  extend_border_grab_area = 20
  hover_icon_on_border = on
  allow_tearing = false

  col.active_border = $fg_tertiary
  col.inactive_border = $fg_disabled

  snap {
    enabled = true
    window_gap = true
    monitor_gap = 20
    border_overlap = true
    respect_gaps = true
  }
}

decoration {
  rounding = 10
  rounding_power = 4.0

  active_opacity = 0.85
  inactive_opacity = 0.80
  fullscreen_opacity = 0.95

  dim_modal = true
  dim_inactive = false
  dim_strength = 0.2 # 0.0 - 1.0
  dim_special = 0.4
  dim_around = 0.8

  blur {
    enabled = true
    size = 10
    passes = 2
    new_optimizations = true
    xray = true
    noise = 0.0
    contrast = 0.85
    brightness = 0.85
    vibrancy = 0.2
    vibrancy_darkness = 0.2
  }
}

input {
  follow_mouse = 1
  sensitivity = 0.4 # -1.0 to 1.0
  accel_profile = adaptive # or flat

  touchpad {
    natural_scroll = false
    disable_while_typing = true
    drag_lock = 1
  }
}

misc {
  force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
  disable_hyprland_logo = true
  disable_splash_rendering = true
  focus_on_activate = true
  new_window_takes_over_fullscreen = 2
  initial_workspace_tracking = 1
}

binds {
  workspace_back_and_forth = true
  hide_special_on_workspace_change = true
}

cursor {
  inactive_timeout = 4
  hide_on_key_press = true
}

gesture = 3, horizontal, workspace

# Source a file (multi-file configs)
source = ~/dotfiles/config/hypr/env-vars.conf
source = ~/dotfiles/config/hypr/animations.conf
source = ~/dotfiles/config/hypr/windowrules.conf
source = ~/dotfiles/config/hypr/keybinds.conf
source = ~/dotfiles/config/hypr/userprefs.conf # initially empty, to be configured by user and remains static
# Note: as userprefs.conf is sourced at the end, settings configured will override the defaults
