# keybinds
$mainMod = SUPER

# assign apps/cmds
$term = foot
$app_launcher = fuzzel
$files = nautilus
$browser = chromium
$power_menu = wlogout
$clipboard = cliphist list | fuzzel -d | cliphist decode | wl-copy
$clipboard_clr = wl-copy --clear && cliphist wipe && notify-send "clipboard cleared"
$ss = grim - | wl-copy && notify-send "copied screenshot"
$ss_sel = grim -g "$(slurp)" - | swappy -f -

# Power & Session
bind = $mainMod ALT, M, exit,
bind = $mainMod, P, exec, $power_menu

# Launchers
bind = $mainMod, Return, exec, $term
bind = $mainMod, SPACE, exec, $app_launcher
bind = $mainMod, E, exec, $files
bind = $mainMod, B, exec, $browser

# Clipboard & Screenshot
bind = $mainMod, V, exec, $clipboard
bind = $mainMod SHIFT, V, exec, $clipboard_clr
bind = , Print, exec, $ss
bind = SHIFT, Print, exec, $ss_sel
bind = ALT, Print, exec, record-screen full
bind = ALT SHIFT, Print, exec, record-screen region

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, G, togglegroup,
bind = $mainMod, T, togglesplit,
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod SHIFT, F, togglefloating,

# Volume
binde = , XF86AudioRaiseVolume, exec, volumectl -u up
binde = , XF86AudioLowerVolume, exec, volumectl -u down
bind = , XF86AudioMute, exec, volumectl toggle-mute
bind = , XF86AudioMicMute, exec, volumectl -m toggle-mute

# Brightness
binde = , XF86MonBrightnessUp, exec, lightctl up
binde = , XF86MonBrightnessDown, exec, lightctl down

# Media binds
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = $mainMod, BACKSLASH, exec, playerctl play-pause
bind = $mainMod, bracketright, exec, playerctl next
bind = $mainMod, bracketleft, exec, playerctl previous

# Focus movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Tab, bringactivetotop,

# Move window
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Resize window
bind = $mainMod ALT, h, resizeactive, -20 0
bind = $mainMod ALT, j, resizeactive, 0 20
bind = $mainMod ALT, k, resizeactive, 0 -20
bind = $mainMod ALT, l, resizeactive, 20 0

bind = $mainMod ALT, left, resizeactive, -20 0
bind = $mainMod ALT, down, resizeactive, 0 20
bind = $mainMod ALT, up, resizeactive, 0 -20
bind = $mainMod ALT, right, resizeactive, 20 0

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# move to the first empty workspace
bind = $mainMod SHIFT, E, workspace, empty

# relative workspace
bindl = $mainMod, M, workspace, r+1
bindl = $mainMod, N, workspace, r-1
bind = $mainMod SHIFT, M, movetoworkspace, r+1
bind = $mainMod SHIFT, N, movetoworkspace, r-1

# mouse binds
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow # left click
bindm = $mainMod, mouse:273, resizewindow # right click
