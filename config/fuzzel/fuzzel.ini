font="JetBrainsMono NF"
dpi-aware=auto
use-bold=true
prompt="> "
placeholder="search"
icon-theme=Papirus
icons-enabled=yes
hide-before-typing=no
fields=filename,name,generic
password-character=*
match-mode=fzf
sort-result=yes
match-counter=yes
show-actions=no
terminal=foot -e

anchor=center
x-margin=10
y-margin=10
lines=8
minimal-lines=no
width=24
tabs=8
horizontal-pad=20
vertical-pad=10
inner-pad=0

layer=overlay
keyboard-focus=exclusive
exit-on-keyboard-focus-loss=yes
enable-mouse=yes

[dmenu]
mode=text
exit-immediately-if-empty=no

[border]
width=2
radius=10

[colors]
background = 1d2021ff
text = fbf1c7ff
prompt = 83a598ff
placeholder = d5c4a1ff
input = fbf1c7ff
match = fe8019ff
selection = 3c3836ff
selection-text = fbf1c7ff
selection-match = d3869bff
counter = 928374ff
border = 282828ff
