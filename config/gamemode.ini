[general]
# Run this when the game STARTS
# Sets limits to 15W sustained, 22W boost, and a safe 75C temp limit
start=sudo ryzenadj --stapm-limit=15000 --fast-limit=22000 --slow-limit=22000 --tctl-temp=75

# Run this when the game ENDS
# Returns to standard 25W performance profile
end=sudo ryzenadj --stapm-limit=25000 --fast-limit=25000 --slow-limit=25000 --tctl-temp=95
